name: Deploy Digital Twin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run Deployment Script
        shell: bash
        env:
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh "${{ github.event.inputs.environment || 'dev' }}"

      - name: Get Deployment URLs
        id: deploy_outputs
        shell: bash
        working-directory: ./terraform
        run: |
          terraform workspace select "${{ github.event.inputs.environment || 'dev' }}"
          echo "cloudfront_url=$(terraform output -raw cloudfront_url)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw s3_frontend_bucket)" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront
        shell: bash
        env:
          FRONTEND_BUCKET: ${{ steps.deploy_outputs.outputs.frontend_bucket }}
          AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?DomainName=='${FRONTEND_BUCKET}.s3-website-${AWS_REGION}.amazonaws.com']].Id | [0]" \
            --output text)

          if [ "$DISTRIBUTION_ID" != "None" ] && [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
          else
            echo "No CloudFront distribution found for bucket ${FRONTEND_BUCKET}"
          fi

      - name: Deployment Summary
        shell: bash
        run: |
          echo "Deployment Complete!"
          echo "CloudFront URL: ${{ steps.deploy_outputs.outputs.cloudfront_url }}"
          echo "API Gateway: ${{ steps.deploy_outputs.outputs.api_url }}"
          echo "Frontend Bucket: ${{ steps.deploy_outputs.outputs.frontend_bucket }}"